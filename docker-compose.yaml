services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: melissastan
      POSTGRES_PASSWORD: ai_db_demo
      POSTGRES_DB: ai_db_demo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Database/db_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./Database/docker_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melissastan -d ai_db_demo"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://melissastan:ai_db_demo@db:5432/ai_db_demo
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      UPLOAD_DIR: /app/Data/Uploads
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/Data/Uploads

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  uploads:
